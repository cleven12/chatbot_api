[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["src/**"]

[[redirects]]
  from = "/api/v1/health"
  to = "/.netlify/functions/health"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/ingest"
  to = "/.netlify/functions/ingest"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/tenants"
  to = "/.netlify/functions/tenants"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/tenants/*"
  to = "/.netlify/functions/tenants?id=:splat"
  status = 200
  force = true
